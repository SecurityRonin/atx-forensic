# cargo-deny configuration — supply-chain and licence gate.
[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Apache-2.0 crate; permit only permissive, non-copyleft licences in the tree.
# The decode oracle (iLEAPP, MIT) is a separate Python tool run as an external
# reference, never linked, so it never enters this dependency graph.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "ISC",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
