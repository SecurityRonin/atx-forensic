name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    name: Publish atx-core to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@stable # rust-toolchain.toml pins the real version (1.96.0)
      - name: Tag must match atx-core version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          ver=$(grep -m1 '^version' core/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          test "$tag" = "$ver" || { echo "::error::tag v$tag != atx-core $ver"; exit 1; }
      - name: Publish
        run: cargo publish -p atx-core --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
